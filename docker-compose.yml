services:
  db:
    image: mariadb:11
    container_name: calculator-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Test12
      MYSQL_DATABASE: calc_data
    ports:
      - "${MARIADB_HOST_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calculator-app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: calc_data
      DB_USER: root
      DB_PASSWORD: Test12
      DISPLAY: host.docker.internal:0.0
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

volumes:
  db_data:
